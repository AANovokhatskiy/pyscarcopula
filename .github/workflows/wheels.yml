name: Build wheels

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.4
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_* *-win32 *-manylinux_i686"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_ARCHS_MACOS: "universal2"
          CIBW_TEST_COMMAND: >-
            python -c "import numpy as np; from pyscarcopula import ClaytonCopula;
            from pyscarcopula.numerical import _cpp_scar_ou;
            from pyscarcopula.numerical.auto_tm import AutoTMConfig;
            assert _cpp_scar_ou.available();
            u = np.random.default_rng(1).uniform(0.1, 0.9, size=(8, 2));
            value, info = _cpp_scar_ou.loglik(1.0, 0.0, 1.0, u,
            ClaytonCopula(transform_type='softplus'),
            AutoTMConfig(transition_method='matrix', K=12, adaptive=False,
            max_K=None));
            assert info['engine'] == 'cpp'"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          python -m pip install build twine
          python -m build --sdist
          twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
