name: Build wheels

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-musllinux_* *-win32 *-manylinux_i686"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_ARCHS_MACOS: "universal2"
          CIBW_TEST_SKIP: "*-macosx_universal2:x86_64"
          CIBW_BEFORE_TEST: >-
            python -m pip install --prefer-binary
            "numpy>=1.22"
            "scipy>=1.9"
          CIBW_TEST_COMMAND: >-
            python -m pyscarcopula._native_smoke

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          python -m pip install build twine
          python -m build --sdist
          twine check dist/*

      - name: Install and smoke-test sdist
        run: |
          python -m pip install --force-reinstall dist/*.tar.gz
          python -m pyscarcopula._native_smoke

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
