name: Build wheels

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.4
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_* *-win32 *-manylinux_i686"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_ARCHS_MACOS: "universal2"
          CIBW_TEST_SKIP_MACOS: "*-macosx_universal2:x86_64"
          CIBW_BEFORE_TEST: >-
            python -m pip install --prefer-binary
            "numpy>=1.22"
            "scipy>=1.9"
          CIBW_TEST_COMMAND: >-
            python -c "import numpy as np; import pyscarcopula._scar_cpp as m;
            spec = m.CopulaSpec();
            spec.family = m.CopulaFamily.Clayton;
            spec.rotation = m.Rotation.R0;
            spec.transform = m.Transform.Softplus;
            spec.offset = 0.0001;
            params = m.OuParams();
            params.kappa = 1.0;
            params.mu = 0.0;
            params.nu = 1.0;
            cfg = m.OuNumericalConfig();
            cfg.K = 12;
            cfg.grid_range = 3.0;
            cfg.adaptive = False;
            cfg.pts_per_sigma = 4;
            cfg.max_K = 0;
            cfg.r_gh = 3.0;
            cfg.gh_order = 5;
            cfg.auto_small_kdt = 1e-2;
            cfg.spectral_basis_order = 32;
            cfg.spectral_quad_order = 0;
            u = np.random.default_rng(1).uniform(0.1, 0.9, size=(8, 2));
            out = m.ScarOuEvaluator().loglik_matrix(params, spec, u, cfg);
            assert int(out['status']) == 0, out"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          python -m pip install build twine
          python -m build --sdist
          twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
