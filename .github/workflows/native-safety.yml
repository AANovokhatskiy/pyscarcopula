name: Native safety

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/native-safety.yml"
      - "pyscarcopula/_cpp/**"
      - "pyscarcopula/numerical/_cpp_*.py"
      - "pyscarcopula/numerical/gas_filter.py"
      - "pyscarcopula/strategy/gas.py"
      - "pyscarcopula/strategy/initial_point.py"
      - "pyscarcopula/stattests.py"
      - "pyscarcopula/strategy/scar_tm.py"
      - "tests/test_cpp.py"
      - "tests/test_cpp_architecture.py"
      - "tests/test_cpp_gas_wrapper.py"
      - "tests/test_bivariate_gas_contract.py"
      - "tests/test_bivariate_gas_integration.py"
      - "tests/test_gas_backends.py"
      - "tests/test_fit.py"
      - "tests/test_tm_forward.py"
      - "tests/test_multivariate_stochastic_student_corr.py"
      - "setup.py"
      - "tools/check_cpp_architecture.py"
      - "pyproject.toml"
  pull_request:
    paths:
      - ".github/workflows/native-safety.yml"
      - "pyscarcopula/_cpp/**"
      - "pyscarcopula/numerical/_cpp_*.py"
      - "pyscarcopula/numerical/gas_filter.py"
      - "pyscarcopula/strategy/gas.py"
      - "pyscarcopula/strategy/initial_point.py"
      - "pyscarcopula/stattests.py"
      - "pyscarcopula/strategy/scar_tm.py"
      - "tests/test_cpp.py"
      - "tests/test_cpp_architecture.py"
      - "tests/test_cpp_gas_wrapper.py"
      - "tests/test_bivariate_gas_contract.py"
      - "tests/test_bivariate_gas_integration.py"
      - "tests/test_gas_backends.py"
      - "tests/test_fit.py"
      - "tests/test_tm_forward.py"
      - "tests/test_multivariate_stochastic_student_corr.py"
      - "setup.py"
      - "tools/check_cpp_architecture.py"
      - "pyproject.toml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  asan-ubsan:
    name: ASan and UBSan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check C++ architecture
        run: python tools/check_cpp_architecture.py

      - name: Install sanitizer build
        env:
          PYSCA_CPP_SANITIZE: "1"
          PYSCA_CPP_STRICT: "1"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run native safety tests
        env:
          ASAN_OPTIONS: detect_leaks=0:halt_on_error=1:strict_string_checks=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: |
          export LD_PRELOAD="$(gcc -print-file-name=libasan.so)"
          python -m pytest \
            tests/test_cpp_architecture.py \
            tests/test_cpp.py \
            tests/test_cpp_gas_wrapper.py \
            tests/test_bivariate_gas_contract.py \
            tests/test_bivariate_gas_integration.py \
            tests/test_gas_backends.py \
            tests/test_tm_forward.py \
            tests/test_fit.py \
            tests/test_multivariate_stochastic_student_corr.py \
            -m "not benchmark"
